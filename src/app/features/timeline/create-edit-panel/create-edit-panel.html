@if (isOpen) {
  <div class="panel-overlay" (click)="onOverlayClick()"></div>
}

<div class="side-panel" [class.open]="isOpen">
  <div class="panel-inner">
    <div class="panel-header">
      <h2 class="panel-title">Work Order Details</h2>
      <button class="close-btn" (click)="onCancel()">✕</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="panel-form" novalidate>
      <div class="form-group" [class.has-error]="hasError('name')">
        <label class="form-label">Work Order Name <span class="req">*</span></label>
        <input type="text" class="form-input" formControlName="name" placeholder="e.g. EXT-2024-003" />
        @if (hasError('name')) {
          <span class="error-msg">Name is required.</span>
        }
      </div>

      <div class="form-group">
        <label class="form-label">Status <span class="req">*</span></label>
        <select class="form-input" formControlName="status">
          <option value="open">Open</option>
          <option value="in-progress">In Progress</option>
          <option value="complete">Complete</option>
          <option value="blocked">Blocked</option>
        </select>
      </div>

      <div class="form-group" [class.has-error]="hasError('startDate')">
        <label class="form-label">Start Date <span class="req">*</span></label>
        <input type="date" class="form-input" formControlName="startDate" />
        @if (hasError('startDate')) {
          <span class="error-msg">Start date is required.</span>
        }
      </div>

      <div class="form-group" [class.has-error]="hasError('endDate') || endBeforeStart">
        <label class="form-label">End Date <span class="req">*</span></label>
        <input type="date" class="form-input" formControlName="endDate" />
        @if (hasError('endDate')) {
          <span class="error-msg">End date is required.</span>
        }
        @if (endBeforeStart) {
          <span class="error-msg">End date must be after start date.</span>
        }
      </div>

      @if (overlapError) {
        <div class="overlap-error">⚠ {{ overlapError }}</div>
      }

      <div class="panel-actions">
        <button type="button" class="btn btn-cancel" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn btn-primary">{{ submitLabel }}</button>
      </div>
    </form>
  </div>
</div>
